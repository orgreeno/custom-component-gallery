name: Submission Reminder

  on:
    pull_request:
      types: [opened]
      
  permissions:
    pull-requests: write

  jobs:
    comment:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/github-script@v7
          with:
            script: |
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Thanks for submitting your component!

                **Don't forget to complete your submission on the gallery website:**
                👉 https://retoolcustomcomponents.netlify.app/

                Your component won't appear in the gallery until the form is submitted and reviewed. The form is 
                where you add your cover image, description, and tags that appear on your card.

                If you've already submitted the form, you're all set — we'll review it shortly! 🚀`
              })
